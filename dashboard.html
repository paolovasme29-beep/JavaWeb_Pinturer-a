<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css"> 
</head>
<body>
    <!-- SIDE BAR-->
     <div class="topbar">
        <div class="title-business">
            <span>PEPITO SAC</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
     </div>

     <!-- OVERLAY JUNTO CON EL NAVBAR-->
      <div class="overlay"></div>
     <!-- sidebar: es el menu / la barra lateral izquierda...--> 
      <aside class="sidebar"> 
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="#" class="activo" id="activo">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
             <li>
                <a href="#">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>Reportes</span>
                </a>
            </li>
        </ul>
    </aside>
    
    <!--- CONTENIDO PRINCIPAL ( ctrl+})-->
    <main>
        <!-- navigation -->
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span>Reportes</span>
        </nav>
        <div class="main-content">
            <p>AQUI VAMOS A ESCRIBIR EL CONTENIDO</p>
        </div>
    </main>
</body>
</html>
